services:
  postgres:
    image: postgres:18
    restart: always
    shm_size: 128mb
    volumes:
      - soliloan-db:/var/lib/postgresql
    networks:
      - backend_network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}

volumes:
  soliloan-db:

networks:
  backend_network:
    external: true
    name: soliloan_backend_network
