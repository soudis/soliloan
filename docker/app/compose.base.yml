#
#  Base configuration
#

services:
  app:
    # image: habidat/directloan:${DOCKER_IMAGE_TAG:?}
    restart: unless-stopped
    depends_on:
      - postgres
    labels:
      - traefik.enable=true
      - traefik.http.routers.soliloan.rule=Host(`${TRAEFIK_HOST:?}`)
      - traefik.http.routers.soliloan.entrypoints=websecure
      - traefik.http.routers.soliloan.service=soliloan
      - traefik.http.services.soliloan.loadbalancer.server.port=3000
    environment:
      - TZ=Europe/Berlin
      - NEXT_PUBLIC_SOLILOAN_PROJECT_NAME=${SOLILOAN_PROJECT_NAME:?}
    networks:
      - traefik_network
      - backend_network

networks:
  backend_network:
    external: true
    name: soliloan_backend_network
